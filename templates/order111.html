{% extends "base.html" %}
{% block title %}إذن 111 - طلبيات المخزن{% endblock %}
{% block content %}
<h2><i class="fas fa-truck"></i> إذن 111 (طلب أصناف من المخزن)</h2>
<div class="card">
    <div class="card-header">إنشاء إذن جديد</div>
    <div class="card-body">
        <form id="order111Form">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>رقم الإذن</label>
                    <input type="text" id="orderNumber" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label>التاريخ</label>
                    <input type="date" id="orderDate" class="form-control" value="{{ now.date() if now else '' }}" required>
                </div>
            </div>
            <table class="table table-bordered" id="orderItemsTable">
                <thead><tr><th>الصنف</th><th>الكمية المطلوبة</th><th>السعر (اختياري)</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
            <button type="button" class="btn btn-secondary" onclick="addOrderItemRow()"><i class="fas fa-plus"></i> إضافة صنف</button>
            <button type="submit" class="btn btn-primary">حفظ الإذن</button>
        </form>
    </div>
</div>
<div class="card mt-4">
    <div class="card-header">الأذونات المسجلة</div>
    <div class="card-body">
        <div id="ordersList"></div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    function addOrderItemRow(itemId=null, qty=null, price=null) {
        let opts = generateItemOptions(itemId);
        let html = `<tr>
            <td><select class="item-select form-select">${opts}</select></td>
            <td><input type="number" step="0.5" class="quantity form-control" value="${qty || ''}"></td>
            <td><input type="number" step="0.01" class="price form-control" value="${price || ''}"></td>
            <td><button type="button" class="btn btn-danger btn-sm" onclick="$(this).closest('tr').remove()"><i class="fas fa-trash"></i></button></td>
        </tr>`;
        $('#orderItemsTable tbody').append(html);
    }

    $('#order111Form').on('submit', function(e) {
        e.preventDefault();
        let items = [];
        $('#orderItemsTable tbody tr').each(function() {
            let itemId = $(this).find('.item-select').val();
            let qty = $(this).find('.quantity').val();
            let price = $(this).find('.price').val();
            if(itemId && qty) items.push({item_id: parseInt(itemId), quantity: parseFloat(qty), requested_price: parseFloat(price) || 0});
        });
        let data = {
            order_number: $('#orderNumber').val(),
            date: $('#orderDate').val(),
            items: items,
            total_value: items.reduce((sum, i) => sum + (i.quantity * i.requested_price), 0)
        };
        $.post('/api/order111', JSON.stringify(data), function(res) {
            showMessage(res.message);
            $('#order111Form')[0].reset();
            $('#orderItemsTable tbody').empty();
            loadOrders();
        }).fail(() => showMessage('خطأ', 'danger'));
    });

    function loadOrders() {
        $.get('/api/order111', function(data) {
            let html = '<table class="table"><thead><tr><th>رقم الإذن</th><th>التاريخ</th><th>الحالة</th><th>القيمة</th></tr></thead><tbody>';
            data.forEach(o => {
                html += `<tr><td>${o.order_number}</td><td>${formatDate(o.date)}</td><td>${o.status}</td><td>${o.total_value}</td></tr>`;
            });
            html += '</tbody></table>';
            $('#ordersList').html(html);
        });
    }
    $(document).ready(loadOrders);
</script>
{% endblock %}
